<link rel="stylesheet" href="/emprestimos/buscar-emprestimos.css">
<script src="/emprestimos/buscar-emprestimos.js"></script>

<h1 id="titulo-pagina">Carregando...</h1>

<div class="filter-bar">
    <div class="filter-group">
        <label for="filtro-usuario">Filtrar por Usuário:</label>
        <input type="text" id="filtro-usuario" placeholder="Digite o nome ou CPF...">
    </div>
    
    <div class="filter-group">
        <label for="filtro-notebook">Filtrar por Notebook:</label>
        <input type="text" id="filtro-notebook" placeholder="Digite o tombamento ou N/S...">
    </div>
    
    <div class="filter-group" id="grupo-filtro-status">
        <label for="filtro-status">Status:</label>
        <select id="filtro-status">
            <option value="todos">Todos</option>
            <option value="em_dia">Em dia</option>
            <option value="atrasados">Apenas Atrasados</option>
        </select>
    </div>

    <div class="filter-group" id="grupo-filtro-data-enc" style="display: none; flex-direction: row; gap: 10px;">
    <div style="flex: 1;">
        <label for="filtro-data-inicio">De:</label>
        <input type="date" id="filtro-data-inicio">
    </div>
    <div style="flex: 1;">
        <label for="filtro-data-fim">Até:</label>
        <input type="date" id="filtro-data-fim">
    </div>
</div>

    <div class="filter-group" id="grupo-filtro-atraso-enc" style="display: none;">
        <label for="filtro-condicao-enc">Condição de Entrega:</label>
        <select id="filtro-condicao-enc">
            <option value="todos">Todas</option>
            <option value="no_prazo">Devolvido no Prazo</option>
            <option value="com_atraso">Devolvido com Atraso</option>
        </select>
    </div>
    
    <button id="btn-buscar-emprestimo" class="btn-buscar"><i class="fas fa-search"></i></button>
</div>

<div class="loan-list-container">
</div>

<div class="pagination" id="pagination-container-emp">
</div>
