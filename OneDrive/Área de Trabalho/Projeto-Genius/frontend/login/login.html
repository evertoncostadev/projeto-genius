<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GENIUS</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <div class="form-container">
        
        <div class="branding-panel">
            <img src="../assets/logo-genius.png" alt="Logo Genius" class="login-logo">
        </div>

        <div class="form-panel">
            <form id="login-form">
                <h2>Faça Login</h2>
                
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="email" id="email" placeholder="Email" required>
                </div>

                <div class="input-group" style="margin-bottom: 5px;">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="senha" placeholder="Senha" required>
                </div>

                <div style="text-align: right; margin-bottom: 20px;">
                    <a href="#" id="link-esqueci-senha" style="font-size: 0.85rem; color: #3498db; text-decoration: none; font-weight: 500;">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="submit-btn">Entrar</button>

                <p id="message" class="message"></p>
            </form>
        </div>
    </div>

    <div id="modal-esqueci-senha" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: #fff; width: 90%; max-width: 400px; padding: 30px; border-radius: 8px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
            <h2 style="color: #2c3a4b; margin-top: 0; font-size: 1.5rem;"><i class="fas fa-key"></i> Recuperar Senha</h2>
            <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px; line-height: 1.4;">Digite seu e-mail de administrador. Enviaremos um link seguro para você criar uma nova senha.</p>
            
            <form id="form-recuperar-senha">
                <input type="email" id="email-recuperacao" placeholder="Seu e-mail" required style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 15px; box-sizing: border-box; font-family: inherit; font-size: 1rem;">
                <button type="submit" id="btn-enviar-recuperacao" style="width: 100%; padding: 12px; background: #3498db; color: #fff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: background 0.2s; font-size: 1rem;">Enviar Link</button>
                <button type="button" id="btn-cancelar-recuperacao" style="width: 100%; padding: 12px; background: #eee; color: #333; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: background 0.2s;">Cancelar</button>
            </form>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
