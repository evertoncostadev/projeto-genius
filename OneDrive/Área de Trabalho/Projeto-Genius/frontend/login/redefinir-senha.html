<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - GENIUS</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="login-container" style="max-width: 500px; margin: 50px auto;">
        <div class="login-right" style="width: 100%; border-radius: 12px;">
            <form id="form-redefinir" class="login-form">
                <div style="text-align: center; margin-bottom: 20px;">
                    <img src="../assets/logo-genius.png" alt="Logo" style="width: 80px;">
                </div>
                
                <h3 style="text-align: center; margin-bottom: 10px;">Crie uma Nova Senha</h3>
                <p style="text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 25px;">Digite sua nova senha de acesso administrativo abaixo.</p>
                
                <div class="input-group">
                    <label for="senha1">Nova Senha</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="senha1" placeholder="Mínimo 6 caracteres" minlength="6" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="senha2">Confirmar Nova Senha</label>
                    <div class="input-icon">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="senha2" placeholder="Repita a senha" required>
                    </div>
                </div>

                <button type="submit" id="btn-salvar-nova" class="btn-login">Salvar Nova Senha</button>
                <div style="text-align: center; margin-top: 15px;">
                    <a href="login.html" style="font-size: 0.9rem; color: #64748b; text-decoration: none;">Voltar ao Login</a>
                </div>
            </form>
        </div>
    </div>

    <script src="redefinir-senha.js"></script>
</body>
</html>
