<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - GENIUS</title>
    <link rel="stylesheet" href="portal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .auth-container { max-width: 400px; margin: 80px auto; background: white; padding: 40px 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .auth-container h2 { color: #0f172a; margin-bottom: 10px; font-size: 1.8rem; }
        .auth-container p { color: #64748b; margin-bottom: 25px; line-height: 1.5; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #1e293b; font-size: 0.9rem; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; outline: none; transition: border 0.3s; }
        .input-group input:focus { border-color: #38bdf8; }
        .btn-block { width: 100%; padding: 14px; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .btn-block:hover { background: #0ea5e9; color: white; }
        .back-link { display: inline-block; margin-top: 25px; color: #64748b; text-decoration: none; font-weight: 600; }
        .back-link:hover { color: #38bdf8; }
    </style>
</head>
<body>
    <header class="portal-header">
        <div class="container header-container">
            <img src="assets/logo-genius.png" alt="Logo GENIUS" class="logo">
        </div>
    </header>

    <div class="container">
        <div class="auth-container">
            <h2>Esqueceu sua senha?</h2>
            <p>Digite seu e-mail cadastrado e enviaremos um link seguro de recuperação.</p>
            <form id="form-esqueci">
                <div class="input-group">
                    <label>E-mail cadastrado</label>
                    <input type="email" id="email" required placeholder="Ex: aluno@email.com">
                </div>
                <button type="submit" class="btn-block" id="btn-submit">Enviar Link Mágico</button>
            </form>
            <a href="portal.html" class="back-link"><i class="fas fa-arrow-left"></i> Voltar ao Início</a>
        </div>
    </div>

    <script>
        document.getElementById('form-esqueci').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = document.getElementById('btn-submit');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';

            try {
                const res = await fetch('http://localhost:3000/api/esqueci-senha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                
                if(res.ok) {
                    alert('Sucesso! Verifique a sua caixa de entrada (e o SPAM). O link expira em 1 hora.');
                    window.location.href = 'portal.html';
                } else {
                    alert(data.message || 'Erro ao solicitar recuperação.');
                    btn.disabled = false;
                    btn.innerHTML = 'Enviar Link Mágico';
                }
            } catch(err) {
                alert('Erro de conexão com o servidor.');
                btn.disabled = false;
                btn.innerHTML = 'Enviar Link Mágico';
            }
        });
    </script>
</body>
</html>
