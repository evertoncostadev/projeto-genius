<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Nova Senha - GENIUS</title>
    <link rel="stylesheet" href="portal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .auth-container { max-width: 400px; margin: 80px auto; background: white; padding: 40px 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .auth-container h2 { color: #0f172a; margin-bottom: 10px; font-size: 1.8rem; }
        .auth-container p { color: #64748b; margin-bottom: 25px; line-height: 1.5; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #1e293b; font-size: 0.9rem; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; outline: none; transition: border 0.3s; }
        .input-group input:focus { border-color: #38bdf8; }
        .btn-block { width: 100%; padding: 14px; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .btn-block:hover { background: #0ea5e9; color: white; }
    </style>
</head>
<body>
    <header class="portal-header">
        <div class="container header-container">
            <img src="assets/logo-genius.png" alt="Logo GENIUS" class="logo">
        </div>
    </header>

    <div class="container">
        <div class="auth-container">
            <h2>Criar Nova Senha</h2>
            <p>Crie uma senha forte com no mínimo 6 caracteres para proteger sua conta.</p>
            <form id="form-redefinir">
                <div class="input-group">
                    <label>Nova Senha</label>
                    <input type="password" id="novaSenha" required placeholder="Mínimo de 6 caracteres" minlength="6">
                </div>
                <div class="input-group">
                    <label>Confirmar Nova Senha</label>
                    <input type="password" id="confirmaSenha" required placeholder="Repita a nova senha" minlength="6">
                </div>
                <button type="submit" class="btn-block" id="btn-submit">Salvar Nova Senha</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('form-redefinir').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const novaSenha = document.getElementById('novaSenha').value;
            const confirmaSenha = document.getElementById('confirmaSenha').value;
            const btn = document.getElementById('btn-submit');

            if (novaSenha !== confirmaSenha) {
                alert('As senhas não coincidem. Tente novamente.');
                return;
            }

            // Captura o "token" secreto que veio no link do e-mail
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                alert('Link de recuperação inválido ou quebrado.');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';

            try {
                const res = await fetch('http://localhost:3000/api/resetar-senha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, novaSenha })
                });
                const data = await res.json();
                
                if(res.ok) {
                    alert('Senha alterada com sucesso! Você já pode fazer login.');
                    // Aqui pode mandar o aluno para a tela de login dele (se tivermos) ou portal
                    window.location.href = 'portal.html'; 
                } else {
                    alert(data.message || 'Erro ao redefinir a senha.');
                    btn.disabled = false;
                    btn.innerHTML = 'Salvar Nova Senha';
                }
            } catch(err) {
                alert('Erro de conexão com o servidor.');
                btn.disabled = false;
                btn.innerHTML = 'Salvar Nova Senha';
            }
        });
    </script>
</body>
</html>
