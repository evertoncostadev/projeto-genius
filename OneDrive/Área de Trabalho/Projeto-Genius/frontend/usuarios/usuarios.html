<link rel="stylesheet" href="/usuarios/usuarios.css">

<div class="form-wrapper-usuario">
    <h2>Cadastrar Novo Usuário</h2>

    <form id="form-cadastrar-usuario" novalidate>
        
        <fieldset>
            <legend>Informações Pessoais</legend>
            <div class="form-grid">
                
                <div class="input-group span-3">
                    <label for="nome">Nome completo *</label>
                    <input type="text" id="nome" name="nome" placeholder="Ex: Maria da Silva" required>
                    <span class="error-msg" id="erro-nome"></span>
                </div>

                <div class="input-group file-input-custom span-3">
                    <label for="foto">Foto de Perfil * (Máx 5MB, JPG/PNG)</label>
                    <div class="file-input-wrapper">
                        <label for="foto-file" class="file-btn">Escolher foto</label>
                        <span id="foto-name" class="file-name-display">Nenhuma foto...</span>
                        <input type="file" id="foto-file" name="foto" accept="image/jpeg, image/png" required>
                    </div>
                    <span class="error-msg" id="erro-foto"></span>
                </div>
                
                <div class="input-group">
                    <label for="data_nascimento">Data de nascimento *</label>
                    <input type="date" id="data_nascimento" name="data_nascimento" required>
                    <span class="error-msg" id="erro-data"></span>
                </div>

                <div class="input-group">
                   <label for="cpf">CPF *</label>
                   <input type="text" id="cpf" name="cpf" placeholder="Apenas números" maxlength="14" required>
                   <span class="error-msg" id="erro-cpf"></span>
                </div>
                
                <div class="input-group">
                    <label for="sexo">Sexo *</label>
                    <select id="sexo" name="sexo" required>
                        <option value="" disabled selected>Selecione</option>
                        <option value="masculino">Masculino</option>
                        <option value="feminino">Feminino</option>
                        <option value="outro">Outro</option>
                        <option value="nao_informar">Prefiro não informar</option>
                    </select>
                    <span class="error-msg" id="erro-sexo"></span>
                </div>

                <div class="input-group" id="group-senha">
                    <label for="senha">Criar Senha *</label>
                    <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres" minlength="6" required>
                    <span class="error-msg" id="erro-senha"></span>
                </div>

                <div class="input-group" id="group-confirma-senha">
                    <label for="confirma_senha">Confirmar Senha *</label>
                    <input type="password" id="confirma_senha" name="confirma_senha" placeholder="Repita a senha" minlength="6" required>
                    <span class="error-msg" id="erro-confirma"></span>
                </div>

            </div>
        </fieldset>

        <fieldset>
            <legend>Informações Acadêmicas</legend>
            <div class="form-grid">
                <div class="input-group">
                    <label for="matricula">Matrícula *</label>
                    <input type="text" id="matricula" name="matricula" placeholder="2024123456" maxlength="13" required>
                    <span class="error-msg" id="erro-matricula"></span>
                </div>
                
                <div class="input-group">
                    <label for="curso">Curso *</label>
                    <select id="curso" name="curso" required>
                        <option value="" disabled selected>Selecione o curso</option>
                        <option value="ads">Análise e Desenv. de Sistemas</option>
                        <option value="ciencia_dados">Ciência de Dados</option>
                    </select>
                    <span class="error-msg" id="erro-curso"></span>
                </div>

                <div class="input-group">
                    <label for="periodo">Período *</label>
                    <select id="periodo" name="periodo" required>
                        <option value="" disabled selected>Selecione</option>
                        <option value="1">1º</option>
                        <option value="2">2º</option>
                        <option value="3">3º</option>
                        <option value="4">4º</option>
                    </select>
                    <span class="error-msg" id="erro-periodo"></span>
                </div>

                <div class="input-group">
                    <label for="turno">Turno *</label>
                    <select id="turno" name="turno" required>
                        <option value="" disabled selected>Selecione</option>
                        <option value="matutino_noturno">Matutino - Noturno</option>
                        <option value="vespertino_noturno">Vespertino - Noturno</option>
                    </select>
                    <span class="error-msg" id="erro-turno"></span>
                </div>

                <div class="input-group file-input-custom">
                    <label for="termo">Termo de responsabilidade *</label>
                    <div class="file-input-wrapper">
                        <label for="termo-file" class="file-btn">Escolher arquivo</label>
                        <span id="termo-name" class="file-name-display">Nenhum arq...</span>
                        <input type="file" id="termo-file" name="termo" accept=".pdf, .doc, .docx" required>
                    </div>
                    <span class="error-msg" id="erro-termo"></span>
                </div>

            </div>
        </fieldset>

        <fieldset>
            <legend>Informações de Endereço</legend>
            <div class="form-grid">
                
                <div class="input-group">
                    <label for="cep">CEP *</label>
                    <input type="text" id="cep" name="cep" placeholder="00000-000" required>
                    <span class="error-msg" id="erro-cep"></span>
                </div>

                <div class="input-group span-2">
                    <label for="rua">Rua *</label>
                    <input type="text" id="rua" name="rua" placeholder="Ex: Av. Principal" required>
                    <span class="error-msg" id="erro-rua"></span>
                </div>

                <div class="input-group">
                    <label for="numero_end">Número *</label>
                    <input type="text" id="numero_end" name="numero_end" placeholder="123" required>
                    <span class="error-msg" id="erro-numero"></span>
                </div>
                
                <div class="input-group">
                    <label for="bairro">Bairro *</label>
                    <input type="text" id="bairro" name="bairro" required>
                    <span class="error-msg" id="erro-bairro"></span>
                </div>

                <div class="input-group">
                    <label for="cidade">Cidade *</label>
                    <input type="text" id="cidade" name="cidade" required>
                    <span class="error-msg" id="erro-cidade"></span>
                </div>

                <div class="input-group">
                    <label for="uf">UF *</label>
                    <input type="text" id="uf" name="uf" maxlength="2" placeholder="PB" required>
                    <span class="error-msg" id="erro-uf"></span>
                </div>

                <div class="input-group span-2">
                    <label for="complemento">Complemento</label>
                    <input type="text" id="complemento" name="complemento" placeholder="Apto 101, Bloco B">
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Informações de Contato</legend>
            <div class="form-grid">
                <div class="input-group">
                    <label for="telefone">Número (WhatsApp) *</label>
                    <input type="text" id="telefone" name="telefone" placeholder="Ex: 83999999999" maxlength="15" required>
                    <span class="error-msg" id="erro-telefone"></span>
                </div>

                <div class="input-group span-2">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" placeholder="usuario@exemplo.com" required>
                    <span class="error-msg" id="erro-email"></span>
                </div>
            </div>
        </fieldset>

        <div class="form-actions">
            <button type="submit" class="btn-submit-usuario">Cadastrar Usuário</button>
        </div>

    </form>
</div>

<script src="/usuarios/usuarios.js"></script>
