<link rel="stylesheet" href="/notebooks/buscar-notebook.css">
<link rel="stylesheet" href="/usuarios/buscar-usuarios.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="/notebooks/buscar-notebook.js"></script>

<h1>Buscar Notebook</h1>

<div class="filter-bar">
    <div class="filter-group">
        <label for="filtro-tombamento">Tombamento:</label>
        <input type="text" id="filtro-tombamento" placeholder="Digite o tombamento...">
    </div>
    
    <div class="filter-group">
        <label for="filtro-serie">Número de Série:</label>
        <input type="text" id="filtro-serie" placeholder="Digite o N/S...">
    </div>

    <button id="btn-buscar-notebook" class="btn-buscar"><i class="fas fa-search"></i></button>
</div>

<div class="notebook-list-container">
</div>
    
<div class="pagination" id="pagination-container-note">
</div>

<div id="modal-notebook" class="modal-backdrop-perfil" style="display: none;">
    <div class="modal-content-perfil">
        
        <div class="modal-header">
            <div class="header-esq">
                <div id="modal-foto" style="font-size: 2.5rem; color: #3498db; margin-right: 15px;"><i class="fas fa-laptop"></i></div>
                <h2 id="modal-tombamento-titulo">Tombamento</h2>
            </div>
            <div class="header-dir">
                <button id="btn-baixar-pdf-note" class="btn-header pdf"><i class="fas fa-file-pdf"></i> <span id="texto-btn-pdf-note">Baixar Dados</span></button>
                <button id="btn-fechar-notebook" class="close-btn" title="Fechar">&times;</button>
            </div>
        </div>

        <div id="alerta-emprestimo-note" class="alerta-emprestimo" style="display: none;"></div>

        <div class="tabs-perfil">
            <button class="tab-btn-note active" data-target="tab-dados-note">Dados do Equipamento</button>
            <button class="tab-btn-note" data-target="tab-historico-note">Histórico de Empréstimos</button>
        </div>

        <div id="conteudo-para-pdf-note">
            <div id="tab-dados-note" class="tab-content-note active">
                <form id="form-edicao-note" novalidate>
                    <input type="hidden" id="edit-note-id">
                    
                    <h4 style="color: #2c3a4b; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-top: 0;">Especificações</h4>
                    <div class="grid-edicao">
                        <div class="input-modal">
                            <label>Tombamento</label>
                            <input type="text" id="edit-note-tombamento" name="tombamento" required>
                            <span class="error-msg"></span>
                        </div>
                        <div class="input-modal">
                            <label>Número de Série</label>
                            <input type="text" id="edit-note-serie" name="numero_serie" required>
                            <span class="error-msg"></span>
                        </div>
                        <div class="input-modal">
                            <label>Modelo / Marca</label>
                            <input type="text" id="edit-note-modelo" name="modelo" required>
                            <span class="error-msg"></span>
                        </div>
                    </div>

                    <div class="area-salvar">
                        <button type="submit" id="btn-salvar-note" class="btn-salvar-modal" style="display: none;">Salvar Alterações</button>
                    </div>
                </form>
            </div>

            <div id="tab-historico-note" class="tab-content-note" style="display: none;">
                
                <div class="filtro-hist" style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                    <select id="filtro-dia-hist-note" style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; outline: none;">
                        <option value="todos">Dia (Todos)</option>
                        <option value="01">01</option> <option value="02">02</option> <option value="03">03</option>
                        <option value="04">04</option> <option value="05">05</option> <option value="06">06</option>
                        <option value="07">07</option> <option value="08">08</option> <option value="09">09</option>
                        <option value="10">10</option> <option value="11">11</option> <option value="12">12</option>
                        <option value="13">13</option> <option value="14">14</option> <option value="15">15</option>
                        <option value="16">16</option> <option value="17">17</option> <option value="18">18</option>
                        <option value="19">19</option> <option value="20">20</option> <option value="21">21</option>
                        <option value="22">22</option> <option value="23">23</option> <option value="24">24</option>
                        <option value="25">25</option> <option value="26">26</option> <option value="27">27</option>
                        <option value="28">28</option> <option value="29">29</option> <option value="30">30</option>
                        <option value="31">31</option>
                    </select>
                    
                    <select id="filtro-mes-hist-note" style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; outline: none;">
                        <option value="todos">Mês (Todos)</option>
                        <option value="01">Janeiro</option> <option value="02">Fevereiro</option> <option value="03">Março</option>
                        <option value="04">Abril</option> <option value="05">Maio</option> <option value="06">Junho</option>
                        <option value="07">Julho</option> <option value="08">Agosto</option> <option value="09">Setembro</option>
                        <option value="10">Outubro</option> <option value="11">Novembro</option> <option value="12">Dezembro</option>
                    </select>
                    
                    <select id="filtro-ano-hist-note" style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; outline: none;">
                        <option value="todos">Ano (Todos)</option>
                        <option value="2023">2023</option> <option value="2024">2024</option>
                        <option value="2025">2025</option> <option value="2026">2026</option>
                        <option value="2027">2027</option> <option value="2028">2028</option>
                        <option value="2029">2029</option> <option value="2030">2030</option>
                    </select>
                </div>

                <div id="lista-historico-note" class="lista-historico">
                </div>
            </div>
        </div>
    </div>
</div>
